<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asadbek | meliqoziyev.uz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
        #snow-canvas { z-index: 1; pointer-events: none; } 
        #canvas-3d { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; display: none; }
        #output_canvas, #input_video { display: none !important; }
        
        /* JJK Kamera uchun */
        #jjk-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 90; display: none; transform: scaleX(-1); object-fit: cover; }
        #jjk-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 91; display: none; transform: scaleX(-1); pointer-events: none; }
        
        #main-content { height: 100vh; width: 100%; position: relative; z-index: 100; }
        .page { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .active { display: flex; }
        .cyber-panel { border: 1px solid #0f0; background: rgba(0, 0, 0, 0.85); padding: 15px; border-radius: 15px; width: 100%; max-width: 340px; margin: 10px 0; position: relative; box-shadow: 0 0 15px rgba(0,255,0,0.2); }
        .cyber-panel::before { content: attr(data-label); position: absolute; top: -10px; left: 15px; background: #000; color: #0f0; font-size: 11px; padding: 0 8px; border: 1px solid #0f0; text-transform: uppercase; letter-spacing: 1px; }
        video { width: 100%; border-radius: 8px; border: 1px solid rgba(0,255,0,0.5); }
        audio { width: 100%; height: 40px; filter: invert(100%) hue-rotate(90deg) brightness(1.5); margin-top: 5px; }
        .controls { display: flex; justify-content: space-around; align-items: center; margin-top: 10px; }
        .c-btn { background: none; border: 1px solid #0f0; color: #0f0; padding: 5px 15px; border-radius: 5px; cursor: pointer; transition: 0.3s; font-size: 18px; }
        .nav-btn { position: fixed; top: 50%; transform: translateY(-50%); font-size: 45px; color: #0f0; cursor: pointer; z-index: 1000; text-shadow: 0 0 15px #0f0; }
        #nextBtn { right: 10px; } #prevBtn { left: 10px; display: none; }
        #big-time { font-size: 24px; color: #0f0; font-family: monospace; margin-bottom: 10px; text-shadow: 0 0 10px #0f0; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 2px solid #0f0; margin-bottom: 15px; box-shadow: 0 0 15px #0f0; }
        .card { width: 260px; padding: 10px; margin: 6px 0; border-radius: 10px; text-decoration: none; color: #fff; font-weight: bold; display: flex; align-items: center; background: rgba(0, 255, 0, 0.1); border: 1px solid #0f0; transition: 0.3s; font-size: 14px; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; background: #000; border: 1px solid #0f0; color: #fff; border-radius: 5px; outline: none; }
        .send-btn { width: 100%; padding: 10px; background: #0f0; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; color: #000; margin-top: 5px; }
        #success-msg { display: none; color: #0f0; font-family: monospace; border: 1px solid #0f0; padding: 20px; background: rgba(0,0,0,0.85); border-radius: 15px; box-shadow: 0 0 15px #0f0; max-width: 300px; }
        @keyframes shake { 0%, 100% { transform: translate(0); } 10%, 30%, 50%, 70%, 90% { transform: translate(-5px, 0); } 20%, 40%, 60%, 80% { transform: translate(5px, 0); } }
    </style>
</head>
<body>

    <canvas id="snow-canvas"></canvas>
    <video id="input_video"></video>
    <video id="jjk-video" autoplay playsinline></video>
    <canvas id="jjk-canvas"></canvas>
    <div id="canvas-3d"></div>

    <div id="main-content">
        <i class="fas fa-chevron-left nav-btn" id="prevBtn" onclick="movePage(-1)"></i>
        <i class="fas fa-chevron-right nav-btn" id="nextBtn" onclick="movePage(1)"></i>

        <div class="page active" id="p1">...</div>
        <div class="page" id="p2">...</div>
        <div class="page" id="p3">...</div>
        <div class="page" id="p4">...</div>

        <div class="page" id="p5"></div>
    </div>

    <script>
        // ... (Sening oldingi koding shu yerda qoladi) ...
        
        // JJK Logikasi
        let cur = 1, jjkActive = false, voiceReady = false, skill = "";
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.continuous = true; rec.lang = 'en-US';
        rec.onresult = (e) => {
            const t = e.results[e.results.length-1][0].transcript.toLowerCase();
            if(t.includes("ryoiki") || t.includes("infinite")) { skill = "gojo"; voiceReady = true; }
            else if(t.includes("shrine") || t.includes("sukuna")) { skill = "sukuna"; voiceReady = true; }
            setTimeout(() => { voiceReady = false; }, 5000);
        };

        const hands = new Hands({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.onResults(res => {
            if(cur === 5 && jjkActive && voiceReady && res.multiHandLandmarks?.length > 0) {
                const lm = res.multiHandLandmarks[0];
                if(Math.hypot(lm[8].x - lm[12].x, lm[8].y - lm[12].y) < 0.03) {
                    document.body.style.animation = "shake 0.3s infinite";
                    setTimeout(() => { document.body.style.animation = ""; voiceReady = false; }, 3000);
                }
            }
        });

        const cam = new Camera(document.getElementById('jjk-video'), { onFrame: async () => await hands.send({image: document.getElementById('jjk-video')}), width: 1280, height: 720 });

        function movePage(s) {
            document.getElementById('p'+cur).classList.remove('active');
            cur += s;
            document.getElementById('p'+cur).classList.add('active');
            document.getElementById('prevBtn').style.display = (cur==1)?'none':'block';
            document.getElementById('nextBtn').style.display = (cur==5)?'none':'block';
            
            jjkActive = (cur === 5);
            document.getElementById('jjk-video').style.display = document.getElementById('jjk-canvas').style.display = jjkActive ? 'block' : 'none';
            if(jjkActive) { cam.start(); rec.start(); } else { cam.stop(); rec.stop(); }
            // 4-bo'lim logikasi ham o'zgarishsiz qoldi...
        }
    </script>
</body>
</html>
